spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/walletslotdb?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: <<·개발 환경 MySQL 사용자명·>>
    password: <<·개발 환경 MySQL 비밀번호·>>

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: Asia/Seoul
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect

app:
  security:
    jwt:
      secret_b64: <<·개발 환경 JWT 서명용 Base64 인코딩된 비밀키·>>

    refresh:
      enabled: true          # ✅ dev에서 리프레시 사용
      rotation: true         # 회전(rotate) 사용
      reuse-block: true      # 재사용 탐지 시 차단
      hash-pepper: <<·개발 환경 리프레시 토큰 해시용 페퍼 값·>>  # base에 이미 있으면 생략 가능

    pepper:
      cipher:
        pepper_v1: <<·개발 환경 비밀번호 암호화용 페퍼 v1 (plain:접두사 포함)·>>
        pepper_v0: <<·개발 환경 비밀번호 암호화용 페퍼 v0·>>

fcm:
  server:
    project-id: "walletslot-9dc34"
    service-account-json-path: walletslot-9dc34-firebase-adminsdk-fbsvc-0a23894ecd.json

api:
  ssafy:
    finance:
      baseUrl: https://finopenapi.ssafy.io
      apiKey: <<·개발 환경 SSAFY 금융 API 키·>>
      userKey: <<·개발 환경 SSAFY 금융 사용자 키·>>
    gms:
      key: <<·개발 환경 SSAFY GMS API 키·>>
  haeji:
    openai:
      key: <<·개발 환경 OpenAI API 키·>>
